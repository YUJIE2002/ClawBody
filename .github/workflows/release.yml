name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.target.name }})
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: Windows (x64)
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - name: macOS (ARM64)
            os: macos-latest
            rust-target: aarch64-apple-darwin
          - name: macOS (x64)
            os: macos-latest
            rust-target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust-target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - run: npm ci

      # Download the default VRM model for bundling
      - run: npm run setup

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ClawBody ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/YUJIE2002/ClawBody/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target.rust-target }}
