name: 🐛 Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ClawBody
        2. Go to Settings
        3. Click on...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: ClawBody Version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: openclaw
    attributes:
      label: OpenClaw Deployment
      options:
        - Local (same machine)
        - Remote VPS
        - Tailscale
        - Other
